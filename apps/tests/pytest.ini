[pytest]
# base_url drives Playwright's `page` navigation. Overridden at runtime by the
# `base_url` fixture (conftest.py) which reads the BASE_URL env var so the same
# suite works against local dev (:8000) and the same-origin container image.
base_url = http://localhost:8000

# Trace + screenshot only when a test fails, so the Allure report carries
# debuggable artifacts without bloating green runs.
addopts =
    --tracing=retain-on-failure
    --screenshot=only-on-failure
    --video=retain-on-failure

# Registered markers so Allure / `pytest -m` can target each layer.
markers =
    ui: browser-driven end-to-end tests via the Page Object Model
    api: REST API contract tests via Playwright's APIRequestContext

testpaths = tests
