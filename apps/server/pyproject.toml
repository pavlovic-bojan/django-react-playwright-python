[tool.black]
line-length = 88
target-version = ["py312"]
extend-exclude = '''
/(
  \.venv
  | migrations
)/
'''

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = [".venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # line length is handled by black

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
# Source modules measured: config + todos application code only.
# Files omitted:
#   manage.py      — CLI entry point; not unit-testable in isolation.
#   wsgi.py        — Production WSGI gateway; exercised at deploy time.
#   asgi.py        — Production ASGI gateway; exercised at deploy time.
#   migrations/    — Auto-generated by Django; not business logic.
#   tests/         — Test code itself is not the subject of measurement.
[tool.coverage.run]
source = ["config", "todos"]
omit = [
    "*/manage.py",
    "*/wsgi.py",
    "*/asgi.py",
    "*/migrations/*",
    "*/tests/*",
]

[tool.coverage.report]
show_missing = true
fail_under = 100
